name: Scrape High Country Events

on:
  schedule:
    # Runs at 7am, 12pm, and 6pm Eastern (UTC-4 during EDT)
    - cron: '0 11 * * *'   # 7am EDT
    - cron: '0 16 * * *'   # 12pm EDT
    - cron: '0 22 * * *'   # 6pm EDT
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scraper
        env:
          GEEKFLARE_API_KEY: ${{ secrets.GEEKFLARE_API_KEY }}
          NPS_API_KEY: ${{ secrets.NPS_API_KEY }}
        run: python scrapers/scraper.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add high_country_events.json
          git diff --staged --quiet || git commit -m "Update events - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
