name: Scrape High Country Events

on:
  schedule:
    - cron: '0 11 */2 * *'  # Every 2 days at 7am EDT (reduces Geekflare credit usage)
  workflow_dispatch:        # Allow manual trigger from GitHub Actions tab

jobs:
  scrape:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scrapers/requirements.txt

      - name: Run scraper
        env:
          GEEKFLARE_API_KEY: ${{ secrets.GEEKFLARE_API_KEY }}
          NPS_API_KEY: ${{ secrets.NPS_API_KEY }}
          EVENTBRITE_API_KEY: ${{ secrets.EVENTBRITE_API_KEY }}
        run: python scrapers/scraper.py

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add high_country_events.json
          git diff --staged --quiet || git commit -m "Update events - $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push
